<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Chess vs Stockfish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #canvas-wrap {
    flex: 1;
    position: relative;
    cursor: pointer;
  }
  #canvas-wrap canvas { display: block; width: 100%; height: 100%; }
  .sidebar {
    width: 270px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #111820;
    border-left: 1px solid #222;
    overflow-y: auto;
  }
  .panel {
    background: linear-gradient(145deg, #161b22, #1c2333);
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
  }
  .panel h3 {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.5px; color: #666; margin-bottom: 8px;
  }
  #status {
    font-size: 15px; font-weight: 600; text-align: center;
    padding: 12px; border-radius: 10px;
    background: linear-gradient(145deg, #161b22, #1c2333);
    border: 1px solid #30363d;
  }
  #eval-display {
    font-size: 32px; font-weight: 800; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .eval-label { font-size: 12px; color: #666; text-align: center; }
  #move-list {
    max-height: 300px; overflow-y: auto;
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 13px; line-height: 1.9;
  }
  #move-list .move-num { color: #555; margin-right: 4px; }
  #move-list .white-move { color: #f0f0f0; }
  #move-list .black-move { color: #999; }
  .buttons { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 10px 14px;
    border: 1px solid #30363d; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    background: linear-gradient(145deg, #161b22, #1c2333);
    color: #e0e0e0; transition: all 0.2s;
  }
  .btn:hover { background: #1f2a3a; border-color: #4a5568; }
  .depth-row { display: flex; align-items: center; gap: 8px; }
  .depth-row label { font-size: 13px; color: #999; }
  .depth-row select {
    flex: 1; padding: 4px 8px; border-radius: 6px;
    border: 1px solid #30363d; background: #161b22;
    color: #e0e0e0; font-size: 13px;
  }
  .thinking { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .clock-row {
    display: flex; gap: 10px; justify-content: center;
  }
  .clock-side {
    flex: 1; text-align: center;
    background: #0d1117; border-radius: 6px; padding: 8px 4px;
  }
  .clock-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; }
  .clock-time {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 22px; font-weight: 700; margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .clock-active { color: #4ade80; }
  .clock-inactive { color: #666; }
  .clock-danger { color: #f87171; }
  #clock-panel.hidden { display: none; }
  #help-text {
    font-size: 11px; color: #555; text-align: center;
    padding: 4px 0;
  }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div class="sidebar">
  <div id="status">Click a piece to move</div>

  <div class="panel">
    <h3>Evaluation</h3>
    <div id="eval-display">0.0</div>
    <div class="eval-label" id="eval-label">Equal position</div>
  </div>

  <div class="panel">
    <div class="depth-row">
      <label for="time-select">Time:</label>
      <select id="time-select">
        <option value="60,0">Bullet 1+0</option>
        <option value="120,1">Bullet 2+1</option>
        <option value="180,2" selected>Blitz 3+2</option>
        <option value="300,3">Blitz 5+3</option>
        <option value="600,5">Rapid 10+5</option>
        <option value="900,10">Rapid 15+10</option>
        <option value="0,0">Unlimited</option>
      </select>
    </div>
    <div class="depth-row" style="margin-top:8px">
      <label for="depth-select">Depth:</label>
      <select id="depth-select">
        <option value="10">10 (fast)</option>
        <option value="15" selected>15</option>
        <option value="20">20 (strong)</option>
      </select>
    </div>
  </div>

  <div class="panel" id="clock-panel">
    <h3>Clock</h3>
    <div class="clock-row">
      <div class="clock-side">
        <div class="clock-label" id="clock-label-top">Engine</div>
        <div class="clock-time" id="clock-top">3:00</div>
      </div>
      <div class="clock-side">
        <div class="clock-label" id="clock-label-bottom">You</div>
        <div class="clock-time" id="clock-bottom">3:00</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h3>Moves</h3>
    <div id="move-list"></div>
  </div>

  <div class="buttons">
    <button class="btn" id="btn-new">New Game</button>
    <button class="btn" id="btn-undo">Undo</button>
  </div>
  <div class="buttons">
    <button class="btn" id="btn-swap">Swap Sides</button>
    <button class="btn" id="btn-resign" style="color:#f87171">Resign</button>
  </div>

  <div id="help-text">Drag to orbit &middot; Scroll to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Game state ────────────────────────────────────────────────────
const game = new Chess();
let thinking = false;
let selectedSquare = null;
let moveHistory = [];
let playerColor = 'w'; // 'w' or 'b'
const pieceMeshes = new Map();   // square → mesh
const squareMeshes = new Map();  // square → mesh
let moveIndicators = [];
let lastMoveHighlights = [];
const capturedMeshes = [];  // meshes placed beside the board
let lastMovedSquare = null;  // square name of the piece that just moved
let auraGroup = null;        // golden glow around last moved piece

function getDepth() {
  return parseInt(document.getElementById('depth-select').value, 10);
}

// ── Chess clock ───────────────────────────────────────────────────
let clockW = 0;          // white's remaining ms
let clockB = 0;          // black's remaining ms
let increment = 0;       // increment in ms
let clockRunning = null;  // 'w' or 'b' or null
let clockInterval = null;
let lastClockTick = 0;
let unlimited = true;

function getTimeControl() {
  const val = document.getElementById('time-select').value;
  const [sec, inc] = val.split(',').map(Number);
  return { baseMs: sec * 1000, incMs: inc * 1000 };
}

function initClocks() {
  const tc = getTimeControl();
  clockW = tc.baseMs;
  clockB = tc.baseMs;
  increment = tc.incMs;
  unlimited = tc.baseMs === 0;
  clockRunning = null;
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = null;

  const panel = document.getElementById('clock-panel');
  if (unlimited) {
    panel.classList.add('hidden');
  } else {
    panel.classList.remove('hidden');
    renderClocks();
    // Start ticking
    clockInterval = setInterval(tickClock, 100);
  }
}

function startClock(color) {
  if (unlimited) return;
  clockRunning = color;
  lastClockTick = performance.now();
}

function stopClockAndIncrement(color) {
  if (unlimited) return;
  // Deduct elapsed since last tick
  if (clockRunning === color) {
    const elapsed = performance.now() - lastClockTick;
    if (color === 'w') clockW -= elapsed; else clockB -= elapsed;
  }
  // Add increment
  if (color === 'w') clockW += increment; else clockB += increment;
  clockRunning = null;
  renderClocks();
}

function tickClock() {
  if (!clockRunning || unlimited) return;
  const now = performance.now();
  const elapsed = now - lastClockTick;
  lastClockTick = now;

  if (clockRunning === 'w') {
    clockW -= elapsed;
    if (clockW <= 0) { clockW = 0; flagged('w'); }
  } else {
    clockB -= elapsed;
    if (clockB <= 0) { clockB = 0; flagged('b'); }
  }
  renderClocks();
}

function flagged(color) {
  clockRunning = null;
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  playSound('gameover');
  const loser = color === playerColor ? 'You' : 'Engine';
  setStatus(`${loser} flagged — Time out!`);
  thinking = true; // lock board
}

function renderClocks() {
  const topColor = playerColor === 'w' ? 'b' : 'w';
  const botColor = playerColor;
  const topMs = topColor === 'w' ? clockW : clockB;
  const botMs = botColor === 'w' ? clockW : clockB;

  document.getElementById('clock-top').textContent = formatTime(topMs);
  document.getElementById('clock-bottom').textContent = formatTime(botMs);
  document.getElementById('clock-label-top').textContent = topColor === playerColor ? 'You' : 'Engine';
  document.getElementById('clock-label-bottom').textContent = botColor === playerColor ? 'You' : 'Engine';

  const topEl = document.getElementById('clock-top');
  const botEl = document.getElementById('clock-bottom');

  topEl.className = 'clock-time ' + (clockRunning === topColor ? (topMs < 30000 ? 'clock-danger' : 'clock-active') : 'clock-inactive');
  botEl.className = 'clock-time ' + (clockRunning === botColor ? (botMs < 30000 ? 'clock-danger' : 'clock-active') : 'clock-inactive');
}

function formatTime(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.ceil(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  if (min >= 1) return `${min}:${sec.toString().padStart(2, '0')}`;
  // Under 1 minute: show tenths
  const tenths = Math.floor((ms % 1000) / 100);
  return `0:${Math.floor(ms / 1000).toString().padStart(2, '0')}.${tenths}`;
}

// ── Three.js setup ────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1510);
scene.fog = new THREE.Fog(0x1a1510, 14, 28);

// Environment map for glass reflections
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x2a2218);
const envLight1 = new THREE.Mesh(
  new THREE.SphereGeometry(1, 16, 8),
  new THREE.MeshBasicMaterial({ color: 0xfff8e8 })
);
envLight1.position.set(3, 5, 3);
envScene.add(envLight1);
const envLight2 = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 16, 8),
  new THREE.MeshBasicMaterial({ color: 0xd4c8b0 })
);
envLight2.position.set(-4, 3, -2);
envScene.add(envLight2);
const envRT = pmremGen.fromScene(envScene, 0.04);
scene.environment = envRT.texture;

const camera = new THREE.PerspectiveCamera(40, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
camera.position.set(0, 9, 9);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minPolarAngle = 0.3;
controls.update();

// ── Lights ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.8);
dirLight.position.set(4, 12, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -6;
dirLight.shadow.camera.right = 6;
dirLight.shadow.camera.top = 6;
dirLight.shadow.camera.bottom = -6;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 25;
dirLight.shadow.bias = -0.002;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xc0d0ff, 0.4);
fillLight.position.set(-5, 6, -4);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xffd080, 0.6, 20);
rimLight.position.set(-3, 5, 8);
scene.add(rimLight);

// ── Board ─────────────────────────────────────────────────────────
const SQ = 1;
const BOARD_Y = 0;
const BOARD_THICK = 0.2;

// ── Procedural tablecloth texture ─────────────────────────────────
function createClothTexture(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Base linen color
  ctx.fillStyle = '#b89868';
  ctx.fillRect(0, 0, size, size);

  const THREAD = 8; // coarse thread spacing

  // Thick woven horizontal threads with strong color variation
  for (let y = 0; y < size; y += THREAD) {
    const brightness = 0.78 + Math.random() * 0.44;
    const r = Math.floor(170 * brightness);
    const g = Math.floor(140 * brightness);
    const b = Math.floor(100 * brightness);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.6)`;
    ctx.fillRect(0, y, size, THREAD * 0.55);
    // Dark gap between threads
    ctx.fillStyle = `rgba(80, 60, 40, 0.15)`;
    ctx.fillRect(0, y + THREAD * 0.55, size, THREAD * 0.45);
  }

  // Thick woven vertical threads with crosshatch effect
  for (let x = 0; x < size; x += THREAD) {
    const brightness = 0.75 + Math.random() * 0.50;
    const r = Math.floor(165 * brightness);
    const g = Math.floor(135 * brightness);
    const b = Math.floor(95 * brightness);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.5)`;
    ctx.fillRect(x, 0, THREAD * 0.55, size);
    // Dark gap
    ctx.fillStyle = `rgba(70, 50, 35, 0.12)`;
    ctx.fillRect(x + THREAD * 0.55, 0, THREAD * 0.45, size);
  }

  // Crosshatch pattern — alternating over/under at intersections
  for (let y = 0; y < size; y += THREAD * 2) {
    for (let x = 0; x < size; x += THREAD * 2) {
      // Darken alternating cells for basket weave look
      ctx.fillStyle = `rgba(60, 40, 25, 0.08)`;
      ctx.fillRect(x, y, THREAD, THREAD);
      ctx.fillRect(x + THREAD, y + THREAD, THREAD, THREAD);
    }
  }

  // Strong organic noise for rough fabric grain
  const imgData = ctx.getImageData(0, 0, size, size);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const noise = (Math.random() - 0.5) * 28;
    d[i]   = Math.min(255, Math.max(0, d[i] + noise));
    d[i+1] = Math.min(255, Math.max(0, d[i+1] + noise));
    d[i+2] = Math.min(255, Math.max(0, d[i+2] + noise));
  }
  ctx.putImageData(imgData, 0, 0);

  return canvas;
}

function createClothNormalMap(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  const THREAD = 8;

  // Neutral normal (pointing up = 128,128,255)
  ctx.fillStyle = 'rgb(128,128,255)';
  ctx.fillRect(0, 0, size, size);

  // Bold wrinkles / folds — more and stronger
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const angle = Math.random() * Math.PI;
    const len = 100 + Math.random() * 300;
    const nx = Math.floor(128 + Math.cos(angle) * 55);
    const ny = Math.floor(128 + Math.sin(angle) * 55);
    ctx.strokeStyle = `rgb(${nx},${ny},220)`;
    ctx.lineWidth = 20 + Math.random() * 40;
    ctx.globalAlpha = 0.2 + Math.random() * 0.2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(
      x + Math.cos(angle + 0.5) * len * 0.5,
      y + Math.sin(angle + 0.5) * len * 0.5,
      x + Math.cos(angle) * len,
      y + Math.sin(angle) * len
    );
    ctx.stroke();
  }
  ctx.globalAlpha = 1.0;

  // Coarse weave bumps — thick thread ridges
  for (let y = 0; y < size; y += THREAD) {
    const v = 118 + Math.floor(Math.random() * 20);
    ctx.strokeStyle = `rgb(128,${v},245)`;
    ctx.lineWidth = THREAD * 0.4;
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(0, y + THREAD * 0.25); ctx.lineTo(size, y + THREAD * 0.25); ctx.stroke();
  }
  for (let x = 0; x < size; x += THREAD) {
    const v = 118 + Math.floor(Math.random() * 20);
    ctx.strokeStyle = `rgb(${v},128,245)`;
    ctx.lineWidth = THREAD * 0.4;
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(x + THREAD * 0.25, 0); ctx.lineTo(x + THREAD * 0.25, size); ctx.stroke();
  }
  ctx.globalAlpha = 1.0;

  return canvas;
}

const clothColorCanvas = createClothTexture(256);
const clothColorTex = new THREE.CanvasTexture(clothColorCanvas);
clothColorTex.wrapS = clothColorTex.wrapT = THREE.RepeatWrapping;
clothColorTex.repeat.set(4, 4);

const clothNormalCanvas = createClothNormalMap(256);
const clothNormalTex = new THREE.CanvasTexture(clothNormalCanvas);
clothNormalTex.wrapS = clothNormalTex.wrapT = THREE.RepeatWrapping;
clothNormalTex.repeat.set(4, 4);

// Table surface — large flat plane with cloth
const tableGeo = new THREE.PlaneGeometry(22, 22);
const tableMat = new THREE.MeshStandardMaterial({
  map: clothColorTex,
  normalMap: clothNormalTex,
  normalScale: new THREE.Vector2(0.6, 0.6),
  roughness: 0.85,
  metalness: 0.0,
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.rotation.x = -Math.PI / 2;
table.position.y = BOARD_Y - BOARD_THICK / 2 - 0.02;
table.receiveShadow = true;
scene.add(table);

// ── Cognac glasses ────────────────────────────────────────────────
function createCognacGlass() {
  const group = new THREE.Group();
  const V = (x, y) => new THREE.Vector2(x, y);
  const S = 4.0; // scale factor for visibility

  // Glass bowl (snifter shape)
  const glassProfile = [
    V(0.001*S, 0),
    V(0.12*S, 0),
    V(0.12*S, 0.02*S),
    V(0.04*S, 0.06*S),
    V(0.03*S, 0.18*S),
    V(0.04*S, 0.22*S),
    V(0.18*S, 0.38*S),
    V(0.20*S, 0.45*S),
    V(0.19*S, 0.52*S),
    V(0.15*S, 0.58*S),
    V(0.13*S, 0.60*S),
  ];
  const glassMat = new THREE.MeshStandardMaterial({
    color: 0xd4e8ff, roughness: 0.05, metalness: 0.1,
    transparent: true, opacity: 0.25,
    side: THREE.DoubleSide, envMapIntensity: 2.0
  });
  const glassGeo = new THREE.LatheGeometry(glassProfile, 24);
  const glassMesh = new THREE.Mesh(glassGeo, glassMat);
  glassMesh.castShadow = true;
  glassMesh.receiveShadow = true;
  group.add(glassMesh);

  // Glass rim highlight
  const rimGeo = new THREE.TorusGeometry(0.13*S, 0.008*S, 8, 24);
  const rimMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.05, metalness: 0.3,
    transparent: true, opacity: 0.5
  });
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.position.y = 0.60*S;
  rim.rotation.x = Math.PI / 2;
  group.add(rim);

  // Cognac liquid (filled to ~60% of bowl)
  const liquidProfile = [
    V(0.001*S, 0.22*S),
    V(0.04*S, 0.22*S),
    V(0.17*S, 0.37*S),
    V(0.19*S, 0.42*S),
    V(0.18*S, 0.44*S),
    V(0.001*S, 0.44*S),
  ];
  const liquidMat = new THREE.MeshStandardMaterial({
    color: 0xc45e10, roughness: 0.15, metalness: 0.0,
    transparent: true, opacity: 0.8,
    emissive: 0x4a1800, emissiveIntensity: 0.15,
    side: THREE.DoubleSide
  });
  const liquidGeo = new THREE.LatheGeometry(liquidProfile, 24);
  const liquidMesh = new THREE.Mesh(liquidGeo, liquidMat);
  group.add(liquidMesh);

  // Liquid surface disc (visible meniscus)
  const surfaceGeo = new THREE.CircleGeometry(0.18*S, 24);
  const surfaceMat = new THREE.MeshStandardMaterial({
    color: 0xd4700a, roughness: 0.1, metalness: 0.2,
    transparent: true, opacity: 0.7
  });
  const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
  surface.rotation.x = -Math.PI / 2;
  surface.position.y = 0.44*S;
  group.add(surface);

  return group;
}

const tableY = BOARD_Y - BOARD_THICK / 2 - 0.02;

const glass1 = createCognacGlass();
glass1.position.set(-6.2, tableY, 3.0);
scene.add(glass1);

const glass2 = createCognacGlass();
glass2.position.set(6.2, tableY, -2.5);
scene.add(glass2);

// Board frame
const frameGeo = new THREE.BoxGeometry(8.6, BOARD_THICK, 8.6);
const frameMat = new THREE.MeshStandardMaterial({
  color: 0x3e2510, roughness: 0.5, metalness: 0.05
});
const frame = new THREE.Mesh(frameGeo, frameMat);
frame.position.y = BOARD_Y;
frame.receiveShadow = true;
frame.castShadow = true;
scene.add(frame);

// Square materials
const lightSqMat = new THREE.MeshStandardMaterial({
  color: 0xe8c99b, roughness: 0.6, metalness: 0.0
});
const darkSqMat = new THREE.MeshStandardMaterial({
  color: 0x8b5e34, roughness: 0.65, metalness: 0.0
});
const sqGeo = new THREE.BoxGeometry(SQ * 0.98, 0.02, SQ * 0.98);

for (let r = 0; r < 8; r++) {
  for (let c = 0; c < 8; c++) {
    const isLight = (r + c) % 2 === 0;
    const mesh = new THREE.Mesh(sqGeo, isLight ? lightSqMat : darkSqMat);
    const pos = squareToWorld(c, r);
    mesh.position.set(pos.x, BOARD_Y + BOARD_THICK / 2 + 0.011, pos.z);
    mesh.receiveShadow = true;
    const sqName = colRowToSquare(c, r);
    mesh.userData.square = sqName;
    mesh.userData.isSquare = true;
    scene.add(mesh);
    squareMeshes.set(sqName, mesh);
  }
}

function squareToWorld(col, row) {
  return { x: (col - 3.5) * SQ, z: (3.5 - row) * SQ };
}
function colRowToSquare(col, row) {
  return String.fromCharCode(97 + col) + (row + 1);
}
function squareToColRow(sq) {
  return [sq.charCodeAt(0) - 97, parseInt(sq[1]) - 1];
}

// ── Board edge labels (a-h, 1-8) — gold on frame ─────────────────
const FILES = ['a','b','c','d','e','f','g','h'];
const RANKS = ['1','2','3','4','5','6','7','8'];
const labelY = BOARD_Y + BOARD_THICK / 2 + 0.012;

function makeGoldLabel(text) {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  // Gold gradient text
  ctx.font = 'bold 90px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const grad = ctx.createLinearGradient(0, 20, 0, 108);
  grad.addColorStop(0, '#f5d882');
  grad.addColorStop(0.3, '#d4a017');
  grad.addColorStop(0.5, '#fbe88a');
  grad.addColorStop(0.7, '#c8920e');
  grad.addColorStop(1, '#a67c00');
  ctx.fillStyle = grad;
  ctx.fillText(text, size / 2, size / 2);
  // Subtle dark outline for depth
  ctx.strokeStyle = 'rgba(80, 50, 0, 0.5)';
  ctx.lineWidth = 2;
  ctx.strokeText(text, size / 2, size / 2);

  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const geo = new THREE.PlaneGeometry(0.4, 0.4);
  const mat = new THREE.MeshStandardMaterial({
    map: tex, transparent: true, alphaTest: 0.05,
    roughness: 0.3, metalness: 0.8,
    emissive: 0x3a2800, emissiveIntensity: 0.2
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  return mesh;
}

// File labels (a-h) along front and back edges
for (let c = 0; c < 8; c++) {
  const x = (c - 3.5) * SQ;
  const lb = makeGoldLabel(FILES[c]);
  lb.position.set(x, labelY, 4.15 * SQ);
  scene.add(lb);
  const lt = makeGoldLabel(FILES[c]);
  lt.position.set(x, labelY, -4.15 * SQ);
  scene.add(lt);
}
// Rank labels (1-8) along left and right edges
for (let r = 0; r < 8; r++) {
  const z = (3.5 - r) * SQ;
  const ll = makeGoldLabel(RANKS[r]);
  ll.position.set(-4.15 * SQ, labelY, z);
  scene.add(ll);
  const lr = makeGoldLabel(RANKS[r]);
  lr.position.set(4.15 * SQ, labelY, z);
  scene.add(lr);
}

// ── Knight: composite horse-head geometry ─────────────────────────
function createKnightGroup(material) {
  const group = new THREE.Group();

  // Base (shared lathe style)
  const baseProfile = [
    V2(0.001,0), V2(0.27,0), V2(0.27,0.04), V2(0.21,0.08),
    V2(0.10,0.20), V2(0.08,0.30), V2(0.08,0.34), V2(0.001,0.34)
  ];
  const base = new THREE.Mesh(
    new THREE.LatheGeometry(baseProfile, SEGMENTS), material
  );
  base.castShadow = true;
  base.receiveShadow = true;
  group.add(base);

  // Neck — angled box rising from the base
  const neckShape = new THREE.Shape();
  neckShape.moveTo(-0.08, 0.32);
  neckShape.lineTo(0.08, 0.32);
  neckShape.lineTo(0.10, 0.58);
  neckShape.lineTo(0.06, 0.68);
  neckShape.lineTo(-0.04, 0.70);
  neckShape.lineTo(-0.08, 0.60);
  neckShape.closePath();

  const neckSettings = { depth: 0.14, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 3 };
  const neckGeo = new THREE.ExtrudeGeometry(neckShape, neckSettings);
  neckGeo.translate(0, 0, -0.07);
  const neck = new THREE.Mesh(neckGeo, material);
  neck.castShadow = true;
  neck.receiveShadow = true;
  group.add(neck);

  // Head — front-facing snout shape
  const headShape = new THREE.Shape();
  headShape.moveTo(0.06, 0.58);
  headShape.lineTo(0.22, 0.52);
  headShape.lineTo(0.24, 0.56);
  headShape.lineTo(0.12, 0.64);
  headShape.lineTo(0.06, 0.68);
  headShape.closePath();

  const headSettings = { depth: 0.12, bevelEnabled: true, bevelThickness: 0.015, bevelSize: 0.015, bevelSegments: 3 };
  const headGeo = new THREE.ExtrudeGeometry(headShape, headSettings);

  const ear2 = new THREE.Mesh(earGeo, material);

function createPieceMesh(type, color) {
  const mat = color === 'w' ? whiteMat : blackMat;

  if (type === 'n') {
    const knightGroup = createKnightGroup(mat);
    // Face knight toward opponent
    if (color === 'b') knightGroup.rotation.y = Math.PI;
    return knightGroup;
  }

  const geo = getPieceGeo(type);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;

// ── Place pieces from FEN ─────────────────────────────────────────
function clearPieces() {
  for (const [, mesh] of pieceMeshes) {
    scene.remove(mesh);
  }
  pieceMeshes.clear();
}

function placePiecesFromFEN() {
  clearPieces();
  const board = game.board();
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = board[7 - r][c];
      if (!piece) continue;
      const sq = colRowToSquare(c, r);
      const mesh = createPieceMesh(piece.type, piece.color);
      const pos = squareToWorld(c, r);
      mesh.position.set(pos.x, BOARD_Y + BOARD_THICK / 2 + 0.02, pos.z);
      mesh.userData.square = sq;
      mesh.userData.color = piece.color;
      mesh.userData.type = piece.type;
      mesh.userData.isPiece = true;
      scene.add(mesh);
      pieceMeshes.set(sq, mesh);
    }
  }
  placeCapturedPieces();
}

// ── Captured pieces beside the board ──────────────────────────────
const PIECE_ORDER = { q: 0, r: 1, b: 2, n: 3, p: 4 };
const STARTING_PIECES = { p: 8, r: 2, n: 2, b: 2, q: 1, k: 1 };

function getCapturedPieces() {
  // Count pieces on the board
  const onBoard = { w: { p:0, r:0, n:0, b:0, q:0, k:0 }, b: { p:0, r:0, n:0, b:0, q:0, k:0 } };
  const board = game.board();
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = board[r][c];
      if (piece) onBoard[piece.color][piece.type]++;
    }
  }
  // Diff against starting count
  const captured = { w: [], b: [] }; // w = white pieces that were captured, b = black pieces captured
  for (const color of ['w', 'b']) {
    for (const type of Object.keys(STARTING_PIECES)) {
      if (type === 'k') continue;
      const missing = STARTING_PIECES[type] - onBoard[color][type];
      for (let i = 0; i < missing; i++) {
        captured[color].push(type);
      }
    }
    // Sort by value
    captured[color].sort((a, b) => PIECE_ORDER[a] - PIECE_ORDER[b]);
  }
  return captured;
}

function clearCapturedMeshes() {
  for (const m of capturedMeshes) scene.remove(m);
  capturedMeshes.length = 0;
}

function placeCapturedPieces() {
  clearCapturedMeshes();
  const captured = getCapturedPieces();
  const tableY = BOARD_Y - BOARD_THICK / 2 - 0.01;
  const scale = 0.6;

  // White pieces captured (by black) → place on the right side of the board (+x)
  // Black pieces captured (by white) → place on the left side of the board (-x)
  for (const color of ['w', 'b']) {
    const pieces = captured[color];
    if (pieces.length === 0) continue;

    // Place along the side of the board
    const sideX = color === 'b' ? -5.2 : 5.2;
    const startZ = 3.5;

    for (let i = 0; i < pieces.length; i++) {
      const type = pieces[i];
      const mesh = createPieceMesh(type, color);
      mesh.scale.set(scale, scale, scale);

      const col = Math.floor(i / 8);
      const row = i % 8;
      const x = sideX + (color === 'b' ? -col * 0.6 : col * 0.6);
      const z = startZ - row * 0.85;

      mesh.position.set(x, tableY, z);
      scene.add(mesh);
      capturedMeshes.push(mesh);
    }
  }
}

// ── Interaction ───────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', onClick);

function onClick(e) {
  if (thinking) return;
  if (game.game_over()) return;
  if (game.turn() !== playerColor) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Collect all clickable objects
  const targets = [];
  for (const [, m] of pieceMeshes) targets.push(...getAllChildren(m));
  for (const [, m] of squareMeshes) targets.push(m);
  for (const ind of moveIndicators) targets.push(...getAllChildren(ind));

  const hits = raycaster.intersectObjects(targets, false);
  if (hits.length === 0) { deselectPiece(); return; }

  // Find which square or piece was hit
  let hitSquare = null;
  for (const hit of hits) {
    let obj = hit.object;
    while (obj && !obj.userData.square) obj = obj.parent;
    if (obj && obj.userData.square) { hitSquare = obj.userData.square; break; }
  }
  // Also check if a move indicator dot was hit
  for (const hit of hits) {
    let obj = hit.object;
    while (obj && !obj.userData.moveTarget) obj = obj.parent;
    if (obj && obj.userData.moveTarget) { hitSquare = obj.userData.moveTarget; break; }
  }

  if (!hitSquare) { deselectPiece(); return; }

  if (selectedSquare) {
    // Check if hitSquare is a valid move
    const validMoves = game.moves({ square: selectedSquare, verbose: true });
    const targetMove = validMoves.find(m => m.to === hitSquare);
    if (targetMove) {
      makePlayerMove(selectedSquare, hitSquare);
      return;
    }
    // Clicked own piece? Select it instead
    const pm = pieceMeshes.get(hitSquare);
    if (pm && pm.userData.color === playerColor) {
      deselectPiece();
      selectPiece(hitSquare);
      return;
    }
    deselectPiece();
  } else {
    const pm = pieceMeshes.get(hitSquare);
    if (pm && pm.userData.color === playerColor) {
      selectPiece(hitSquare);
    }
  }
}

function getAllChildren(obj) {
  const arr = [obj];
  obj.traverse(child => { if (child.isMesh) arr.push(child); });
  return arr;
}

function selectPiece(sq) {
  selectedSquare = sq;
  const mesh = pieceMeshes.get(sq);
  if (!mesh) return;

  playSound('select');

  // Highlight selected piece
  const selMat = mesh.userData.color === 'w' ? whiteSelectedMat : blackSelectedMat;
  mesh.traverse(child => { if (child.isMesh) child.material = selMat; });

  // Show valid moves
  const moves = game.moves({ square: sq, verbose: true });
  const indicatorMat = new THREE.MeshStandardMaterial({
    color: 0x44cc44, transparent: true, opacity: 0.6,
    roughness: 0.8, metalness: 0.0
  });
  const captureMat = new THREE.MeshStandardMaterial({
    color: 0xee4444, transparent: true, opacity: 0.6,
    roughness: 0.8, metalness: 0.0
  });

  for (const move of moves) {
    const [c, r] = squareToColRow(move.to);
    const pos = squareToWorld(c, r);
    const isCapture = move.captured || move.flags.includes('e');
    let indicator;
    if (isCapture) {
      const ringGeo = new THREE.RingGeometry(0.32, 0.44, 20);
      indicator = new THREE.Mesh(ringGeo, captureMat);
    } else {
      const dotGeo = new THREE.CircleGeometry(0.15, 24);
      indicator = new THREE.Mesh(dotGeo, indicatorMat);
    }
    indicator.rotation.x = -Math.PI / 2;
    indicator.position.set(pos.x, BOARD_Y + BOARD_THICK / 2 + 0.025, pos.z);
    indicator.userData.moveTarget = move.to;
    scene.add(indicator);
    moveIndicators.push(indicator);
  }
}

function deselectPiece() {
  if (selectedSquare) {
    const mesh = pieceMeshes.get(selectedSquare);
    if (mesh) {
      const origMat = mesh.userData.color === 'w' ? whiteMat : blackMat;
      mesh.traverse(child => { if (child.isMesh) child.material = origMat; });
    }
  }
  selectedSquare = null;
  clearMoveIndicators();
}

function clearMoveIndicators() {
  for (const ind of moveIndicators) scene.remove(ind);
  moveIndicators = [];
}

function clearLastMoveHighlights() {
  for (const h of lastMoveHighlights) scene.remove(h);
  lastMoveHighlights = [];
}

function highlightLastMove(from, to) {
  clearLastMoveHighlights();
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcccc44, transparent: true, opacity: 0.25,
    roughness: 1.0, metalness: 0.0
  });
  const geo = new THREE.BoxGeometry(SQ * 0.96, 0.015, SQ * 0.96);
  for (const sq of [from, to]) {
    const [c, r] = squareToColRow(sq);
    const pos = squareToWorld(c, r);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x, BOARD_Y + BOARD_THICK / 2 + 0.02, pos.z);
    scene.add(mesh);
    lastMoveHighlights.push(mesh);
  }
  updateAura(to);
}

// ── Golden aura on last moved piece ───────────────────────────────

auraGroup = createAura();

const auraOuter = auraGroup.getObjectByName('auraOuter');

function updateAura(targetSquare) {

// ── Sound effects (Web Audio API — no files needed) ───────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  // Ensure context is running (Chrome autoplay policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;

  if (type === 'move') {
    // Wooden "click" — short filtered noise burst
    const dur = 0.08;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.015));
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 2.0;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(bp).connect(gain).connect(audioCtx.destination);
    src.start(now); src.stop(now + dur);
  }

  else if (type === 'capture') {
    // Heavier thud + knock
    const dur = 0.15;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / audioCtx.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t / 0.025)
              + Math.sin(2 * Math.PI * 180 * t) * 0.3 * Math.exp(-t / 0.04);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 2500;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(lp).connect(gain).connect(audioCtx.destination);
    src.start(now); src.stop(now + dur);
  }

  else if (type === 'check') {
    // Sharp ping — two quick tones
    [800, 1200].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.value = freq;
      const gain = audioCtx.createGain();
      const t = now + i * 0.08;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.12);
    });
  }

  else if (type === 'castle') {
    // Two quick wooden clacks (king + rook)
    [0, 0.1].forEach(delay => {
      const dur = 0.07;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.012));
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 1.5;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.4, now + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, now + delay + dur);
      src.connect(bp).connect(gain).connect(audioCtx.destination);
      src.start(now + delay); src.stop(now + delay + dur);
    });
  }

  else if (type === 'gameover') {
    // Descending chord
    [520, 440, 330].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle'; osc.frequency.value = freq;
      const gain = audioCtx.createGain();
      const t = now + i * 0.18;
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.5);
    });
  }

  else if (type === 'select') {
    // Soft tick
    const dur = 0.04;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.006));
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 3000; bp.Q.value = 3;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(bp).connect(gain).connect(audioCtx.destination);
    src.start(now); src.stop(now + dur);
  }
}

// Determine the right sound for a chess.js move object
function soundForMove(move) {
  if (move.flags.includes('k') || move.flags.includes('q')) return 'castle';
  if (move.captured) return 'capture';
  return 'move';
}

// ── Move execution ────────────────────────────────────────────────
let animating = false;

function makePlayerMove(from, to) {
  deselectPiece();
  const move = game.move({ from, to, promotion: 'q' });
  if (!move) return;
  stopClockAndIncrement(playerColor);
  moveHistory.push(move.san);
  highlightLastMove(from, to);
  const snd = soundForMove(move);
  animatePieceMove(from, to, () => {
    playSound(snd);
    placePiecesFromFEN();
    updateUI();
    if (game.game_over()) { playSound('gameover'); return; }
    if (game.in_check()) playSound('check');
    askStockfish();
  });
}

function animatePieceMove(from, to, callback) {
  const mesh = pieceMeshes.get(from);
  if (!mesh) { callback(); return; }

  animating = true;
  const [fc, fr] = squareToColRow(from);
  const [tc, tr] = squareToColRow(to);
  const startPos = squareToWorld(fc, fr);
  const endPos = squareToWorld(tc, tr);
  const startY = mesh.position.y;
  const duration = 350;
  const startTime = performance.now();

  function tick(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    mesh.position.x = startPos.x + (endPos.x - startPos.x) * ease;
    mesh.position.z = startPos.z + (endPos.z - startPos.z) * ease;
    mesh.position.y = startY + Math.sin(Math.PI * t) * 0.4;
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      animating = false;
      callback();
    }
  }
  requestAnimationFrame(tick);
}

const engineColor = () => playerColor === 'w' ? 'b' : 'w';

async function askStockfish() {
  if (game.game_over()) return;
  thinking = true;
  setStatus('<span class="thinking">Stockfish is thinking...</span>');
  startClock(engineColor());

  try {
    const resp = await fetch('/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen: game.fen(), depth: getDepth() })
    });
    const data = await resp.json();

    if (data.best_move) {
      const from = data.best_move.substring(0, 2);
      const to = data.best_move.substring(2, 4);
      const promo = data.best_move.length > 4 ? data.best_move[4] : undefined;
      const move = game.move({ from, to, promotion: promo });
      if (move) {
        stopClockAndIncrement(engineColor());
        moveHistory.push(move.san);
        highlightLastMove(from, to);
        const snd = soundForMove(move);
        animatePieceMove(from, to, () => {
          playSound(snd);
          placePiecesFromFEN();
          thinking = false;
          updateUI();
          if (game.game_over()) { playSound('gameover'); }
          else if (game.in_check()) playSound('check');
          else startClock(playerColor);
        });
        if (data.evaluation) updateEval(data.evaluation);
        return;
      }
    }
  } catch (err) {
    console.error('Stockfish error:', err);
  }
  thinking = false;
  updateUI();
}

// ── UI updates ────────────────────────────────────────────────────
function updateEval(ev) {
  const display = document.getElementById('eval-display');
  const label = document.getElementById('eval-label');
  // Server evaluates AFTER the engine's move, so it's the player's turn.
  // Stockfish returns eval from the side-to-move's perspective.
  // Positive = good for the player.
  if (ev.type === 'mate') {
    const val = ev.value;
    display.textContent = val > 0 ? `M${val}` : `-M${Math.abs(val)}`;
    display.style.color = val > 0 ? '#4ade80' : '#f87171';
    label.textContent = val > 0 ? 'You mate' : 'Engine mates';
  } else {
    const cp = ev.value / 100;
    display.textContent = (cp >= 0 ? '+' : '') + cp.toFixed(1);
    display.style.color = cp > 0.5 ? '#4ade80' : cp < -0.5 ? '#f87171' : '#e0e0e0';
    label.textContent = cp > 0.5 ? 'You are better' : cp < -0.5 ? 'Engine is better' : 'Equal position';
  }
}

function setStatus(html) {
  document.getElementById('status').innerHTML = html;
}

function updateUI() {
  const isPlayerTurn = game.turn() === playerColor;
  if (game.in_checkmate()) {
    setStatus(isPlayerTurn ? 'Checkmate — You lose!' : 'Checkmate — You win!');
  } else if (game.in_stalemate()) {
    setStatus('Stalemate — Draw');
  } else if (game.in_draw()) {
    setStatus('Draw');
  } else if (game.in_check()) {
    setStatus(isPlayerTurn ? 'You are in check!' : 'Engine is in check!');
  } else {
    setStatus(isPlayerTurn ? 'Your turn — click a piece' : 'Stockfish thinking...');
  }

  const ml = document.getElementById('move-list');
  let html = '';
  for (let i = 0; i < moveHistory.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    html += `<span class="move-num">${num}.</span>`;
    html += `<span class="white-move">${moveHistory[i]}</span> `;
    if (moveHistory[i + 1]) html += `<span class="black-move">${moveHistory[i + 1]}</span> `;
  }
  ml.innerHTML = html;
  ml.scrollTop = ml.scrollHeight;
}

// ── Controls ──────────────────────────────────────────────────────
function resetGame() {
  game.reset();
  moveHistory = [];
  thinking = false;
  selectedSquare = null;
  clearMoveIndicators();
  clearLastMoveHighlights();
  updateAura(null);
  clearCapturedMeshes();
  placePiecesFromFEN();
  document.getElementById('eval-display').textContent = '0.0';
  document.getElementById('eval-display').style.color = '#e0e0e0';
  document.getElementById('eval-label').textContent = 'Equal position';
  initClocks();
  updateUI();
  // If player is black, Stockfish moves first
  if (playerColor === 'b') {
    askStockfish();
  } else {
    startClock('w');
  }
}

document.getElementById('btn-new').addEventListener('click', resetGame);

document.getElementById('btn-undo').addEventListener('click', () => {
  if (thinking || moveHistory.length < 2) return;
  game.undo(); game.undo();
  moveHistory.splice(-2);
  deselectPiece();
  clearLastMoveHighlights();
  placePiecesFromFEN();
  updateUI();
});

document.getElementById('btn-swap').addEventListener('click', () => {
  if (thinking) return;
  playerColor = playerColor === 'w' ? 'b' : 'w';
  rotateCameraToSide(playerColor);
  resetGame();
});

function rotateCameraToSide(color) {
  const targetZ = color === 'w' ? 9 : -9;
  const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const duration = 600;
  const startTime = performance.now();

  function tick(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    camera.position.x = startPos.x + (0 - startPos.x) * ease;
    camera.position.y = startPos.y + (9 - startPos.y) * ease;
    camera.position.z = startPos.z + (targetZ - startPos.z) * ease;
    controls.update();
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

document.getElementById('btn-resign').addEventListener('click', () => {
  if (thinking || game.game_over()) return;
  clockRunning = null;
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  playSound('gameover');
  setStatus('You resigned — Engine wins!');
  thinking = true; // lock the board
});

// Re-init clocks when time control changes
document.getElementById('time-select').addEventListener('change', resetGame);

// ── Resize ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
});

// ── Render loop ───────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Pulse the golden aura
  if (auraGroup && auraGroup.visible) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.002);
    auraRing.material.opacity = 0.35 + 0.3 * pulse;
    auraOuter.material.opacity = 0.1 + 0.15 * pulse;
    auraOuter.scale.setScalar(1.0 + 0.08 * pulse);
    auraLight.intensity = 1.0 + 0.8 * pulse;
  }

  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────────────────
placePiecesFromFEN();
initClocks();
updateUI();

// Pre-compile all shaders so the first frames don't stutter
renderer.compile(scene, camera);

animate();
if (playerColor === 'b') askStockfish();
else startClock('w');
</script>
